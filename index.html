const CSS = `
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Hanken+Grotesk:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
*{box-sizing:border-box}
.fc-root{
  --canvas:#EEF1F4; --panel:#FFFFFF; --ink:#0B2F4D; --soft:#4C5E70; --faint:#8B99A6;
  --line:#DBE2E8; --field:#F3F6F9;
  --green:#09A54C; --green-2:#07813C; --navy:#0B2F4D; --navy-2:#0A2438;
  --up:#09A54C; --base:#C9922A; --down:#C0453A;
  font-family:'Hanken Grotesk',system-ui,sans-serif; color:var(--ink); background:var(--canvas);
  min-height:100vh; width:100%; -webkit-font-smoothing:antialiased; line-height:1.45;
}
.fc-root *{font-family:inherit}
.mono{font-family:'IBM Plex Mono',ui-monospace,monospace;font-variant-numeric:tabular-nums;letter-spacing:-.01em}
.serif{font-family:'Fraunces',Georgia,serif}
.wrap{max-width:1180px;margin:0 auto;padding:0 22px}

/* ---------- welcome ---------- */
.welcome{position:fixed;inset:0;z-index:50;background:linear-gradient(135deg,var(--navy) 0%,#0d3a52 55%,#0E4A42 100%);
  display:flex;align-items:center;justify-content:center;padding:24px;overflow:auto}
.welcome:before{content:"";position:absolute;inset:0;background:radial-gradient(90% 70% at 100% 0%,rgba(9,165,76,.28),transparent 55%);pointer-events:none}
.wcard{max-width:660px;width:100%;text-align:center;position:relative;animation:rise .5s ease both}
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.wlogo{background:#fff;border-radius:16px;padding:18px 26px;display:inline-block;margin-bottom:28px;box-shadow:0 12px 34px -12px rgba(0,0,0,.5)}
.wlogo img{height:50px;display:block}
.w-eyebrow{font-size:11.5px;letter-spacing:.24em;text-transform:uppercase;color:#5FD08F;font-weight:700;margin:0 0 12px}
.w-h{font-size:clamp(27px,5vw,42px);font-weight:800;line-height:1.08;margin:0 0 16px;color:#fff;letter-spacing:-.02em}
.w-h .g{color:var(--green)}
.w-sub{font-size:15.5px;color:#B8DDD6;margin:0 auto 26px;max-width:540px;line-height:1.6}
.wchips{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:30px}
.wchip{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.16);
  padding:9px 15px;border-radius:999px;font-size:12.5px;font-weight:600;color:#D6EEE8}
.wchip svg{width:14px;height:14px;color:var(--green)}
.wctas{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.wbtn{padding:14px 24px;border-radius:12px;font-size:14.5px;font-weight:700;cursor:pointer;border:1px solid transparent;transition:.15s}
.wbtn.primary{background:var(--green);color:#fff;box-shadow:0 8px 22px -8px rgba(9,165,76,.7)}
.wbtn.primary:hover{background:var(--green-2)}
.wbtn.ghost{background:transparent;color:#EAF7F1;border-color:rgba(255,255,255,.3)}
.wbtn.ghost:hover{background:rgba(255,255,255,.08)}
.w-foot{font-size:11.5px;color:#7FB8AD;margin-top:24px;line-height:1.5}

/* ---------- top bar ---------- */
.top{display:flex;align-items:center;gap:16px;padding:18px 0;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:12px;margin-right:auto;cursor:pointer}
.brand img{height:34px;display:block}
.tools{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.seg{display:flex;background:var(--field);border:1px solid var(--line);border-radius:10px;padding:3px}
.seg button{border:0;background:transparent;font-size:12.5px;font-weight:600;color:var(--soft);padding:6px 11px;border-radius:7px;cursor:pointer;transition:.15s}
.seg button[data-on="true"]{background:var(--panel);color:var(--navy);box-shadow:0 1px 3px rgba(0,0,0,.08)}
.btn{border:1px solid var(--line);background:var(--panel);color:var(--navy);font-weight:600;font-size:12.5px;padding:8px 13px;border-radius:9px;cursor:pointer;transition:.15s;white-space:nowrap;display:inline-flex;align-items:center;gap:6px}
.btn:hover{border-color:var(--green);color:var(--green-2)}
.btn.solid{background:var(--green);color:#fff;border-color:var(--green)}
.btn.solid:hover{background:var(--green-2);border-color:var(--green-2);color:#fff}
.btn svg{width:14px;height:14px}

/* ---------- hero ---------- */
.hero{background:linear-gradient(135deg,var(--navy) 0%,#0d3a52 60%,#0E4A42 100%);border-radius:20px;color:#DDEDEA;
  padding:30px 30px 26px;margin-top:6px;position:relative;overflow:hidden;box-shadow:0 18px 44px -22px rgba(11,47,77,.75)}
.hero:before{content:"";position:absolute;inset:0;background:radial-gradient(120% 90% at 100% 0%,rgba(9,165,76,.30),transparent 55%);pointer-events:none}
.hero-grid{display:grid;grid-template-columns:1.4fr 1fr;gap:26px;position:relative;margin-top:6px}
.eyebrow{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:#5FD08F;font-weight:700;margin:0}
.bignum{font-size:clamp(38px,6.4vw,62px);line-height:.98;font-weight:600;color:#F4FBF7;margin:6px 0 2px}
.hero-sub{font-size:13px;color:#A9D6CE;margin:0}
.hero-mets{display:flex;gap:26px;margin-top:20px;flex-wrap:wrap}
.met .k{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:#5FD08F;margin:0 0 3px;font-weight:600}
.met .v{font-size:20px;font-weight:600;color:#EAF7F1;margin:0}
.contrib-h{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#5FD08F;margin:0 0 9px;font-weight:700}
.cbar{display:flex;height:46px;border-radius:11px;overflow:hidden;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14)}
.cseg{display:flex;flex-direction:column;justify-content:center;padding:0 10px;min-width:0;transition:flex-grow .5s cubic-bezier(.2,.7,.2,1);overflow:hidden}
.cseg .p{font-size:14px;font-weight:700;color:#fff;line-height:1;white-space:nowrap}
.cseg .l{font-size:9.5px;letter-spacing:.05em;text-transform:uppercase;color:rgba(255,255,255,.85);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.clegend{display:flex;gap:16px;margin-top:11px;flex-wrap:wrap}
.clegend span{display:flex;align-items:center;gap:6px;font-size:11.5px;color:#BCE0D8}
.dot{width:9px;height:9px;border-radius:3px;flex:0 0 auto}

/* ---------- layout ---------- */
.body{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin:20px 0 20px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:20px}
.card > h2{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--soft);font-weight:700;margin:0 0 4px}
.card .desc{font-size:12.5px;color:var(--faint);margin:0 0 16px}
.field{margin-bottom:15px}.field:last-child{margin-bottom:0}
.field label{display:block;font-size:13px;font-weight:600;margin-bottom:5px}
.field .hint{font-size:11.5px;color:var(--faint);margin:0 0 7px;line-height:1.35}
.inp{display:flex;align-items:center;border:1px solid var(--line);background:var(--field);border-radius:10px;overflow:hidden;transition:.15s}
.inp:focus-within{border-color:var(--green);background:#fff;box-shadow:0 0 0 3px rgba(9,165,76,.14)}
.inp .pre,.inp .suf{font-size:13px;color:var(--soft);padding:0 11px;font-weight:600;flex:0 0 auto}
.inp input{border:0;background:transparent;outline:0;padding:11px 6px;width:100%;font-size:15px;font-family:'IBM Plex Mono',monospace;font-variant-numeric:tabular-nums;color:var(--ink);min-width:0}
.inp input::-webkit-outer-spin-button,.inp input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.inp input[type=number]{-moz-appearance:textfield}
.scn{border:1px solid var(--line);border-radius:13px;padding:14px 14px 12px;margin-bottom:12px;position:relative}
.scn:last-child{margin-bottom:0}
.scn.up{border-left:4px solid var(--up)}.scn.base{border-left:4px solid var(--base)}.scn.down{border-left:4px solid var(--down)}
.scn-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px}
.scn-name{font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px}
.tag{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:3px 7px;border-radius:6px;color:#fff}
.scn-out{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;color:var(--ink);text-align:right}
.scn-out small{display:block;font-family:'Hanken Grotesk',sans-serif;font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--faint)}

`;

const CUR = { USD:{code:"USD",locale:"en-US",sym:"$"}, MXN:{code:"MXN",locale:"es-MX",sym:"$"}, EUR:{code:"EUR",locale:"es-ES",sym:"€"} };

  scenarios:[
    {key:"up",name:"Optimista",tag:"Upside",growth:100,multiple:15,prob:20},

  {key:"down",label:"Pesimista · Downside",title:"Liquidación / bajo crecimiento",range:"2 – 3x",mid:2.5,growth:8,
   d:"Churn elevado, pérdida de tracción o venta forzada (fire sale). El decil inferior privado ronda ~1.9x ARR."},
  {key:"base",label:"Base · Base Case",title:"Mediana privada SaaS",range:"5 – 8x",mid:6,growth:30,
   d:"Crecimiento sólido (25–40%) y métricas de industria. Mediana privada 4.8x–5.3x ARR; pública ~6–7x."},
  {key:"up",label:"Optimista · Upside",title:"Alto crecimiento / salida estratégica",range:"10 – 15x",mid:12,growth:70,
   d:"Crecimiento >40% con NRR >120% y comprador estratégico. Élite pública alcanza 12–18x ARR."},
];

function useCountUp(target, dur=550){
  const [v,setV]=useState(target); const prev=useRef(target);
  useEffect(()=>{
    if(window.matchMedia && window.matchMedia("(prefers-reduced-motion:reduce)").matches){setV(target);prev.current=target;return;}
    const from=prev.current,to=target,t0=performance.now(); let raf;
    const tick=(t)=>{const p=Math.min(1,(t-t0)/dur);const e=1-Math.pow(1-p,3);setV(from+(to-from)*e);
      if(p<1)raf=requestAnimationFrame(tick);else prev.current=to;};
    raf=requestAnimationFrame(tick); return ()=>cancelAnimationFrame(raf);
  },[target,dur]); return v;
}
const Ico = {
  scen:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 3v18h18M7 15l4-5 3 3 5-7"/></svg>,
  mult:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 5l14 14M19 5L5 19"/></svg>,
  pdf:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z M14 2v6h6"/></svg>,
};

function App(){
  const [entered,setEntered]=useState(false);
  const [cur,setCur]=useState("USD");
  const [arr0,setArr0]=useState(DEFAULTS.arr0);
  const [horizon,setHorizon]=useState(DEFAULTS.horizon);
  const [rate,setRate]=useState(DEFAULTS.rate);
  const [investment,setInvestment]=useState(DEFAULTS.investment);
  const [scn,setScn]=useState(DEFAULTS.scenarios.map(s=>({...s})));
  const [saved,setSaved]=useState([]);
  const [saveName,setSaveName]=useState("");
  const [busy,setBusy]=useState(false);

  const C=CUR[cur];
  const money=(v,max=0)=>new Intl.NumberFormat(C.locale,{style:"currency",currency:C.code,maximumFractionDigits:max,minimumFractionDigits:0}).format(isFinite(v)?v:0);
  const compact=(v)=>{const a=Math.abs(v);
    if(a>=1e9)return C.sym+(v/1e9).toFixed(2)+"B";
    if(a>=1e6)return C.sym+(v/1e6).toFixed(1)+"M";
    if(a>=1e3)return C.sym+(v/1e3).toFixed(0)+"K";
    return money(v);};

  const calc=useMemo(()=>{
    const r=rate/100, df=Math.pow(1+r,horizon);
    const rows=scn.map(s=>{const arrN=arr0*Math.pow(1+s.growth/100,horizon);const exit=arrN*s.multiple;
      const pv=df?exit/df:0; return {...s,arrN,exit,pv,weighted:pv*(s.prob/100)};});
    const preMoney=rows.reduce((a,b)=>a+b.weighted,0);
    const postMoney=preMoney+investment;
    const equity=postMoney>0?investment/postMoney:0;
    const probSum=scn.reduce((a,b)=>a+b.prob,0);
    return {r,df,rows,preMoney,postMoney,equity,probSum};
  },[arr0,horizon,rate,investment,scn]);

  const heroVal=useCountUp(calc.preMoney);
  const setS=(i,k,val)=>setScn(p=>p.map((s,j)=>j===i?{...s,[k]:val}:s));
  const applyTemplate=(t)=>{setArr0(t.arr0);setHorizon(t.horizon);setRate(t.rate);setInvestment(t.investment);setScn(t.scenarios.map(s=>({...s})));};
  const reset=()=>applyTemplate(DEFAULTS);
  const applyBench=(b)=>setScn(p=>p.map(s=>s.key===b.key?{...s,multiple:b.mid,growth:b.growth}:s));

  const probOk=Math.abs(calc.probSum-100)<0.01;
  const totalW=calc.rows.reduce((a,b)=>a+Math.max(0,b.weighted),0)||1;

  const refreshSaved=useCallback(async()=>{
    try{
      const res=await storage.list("licitia:scn:");
      const keys=(res&&res.keys)||[];
      const items=await Promise.all(keys.map(async k=>{try{const r=await storage.get(k);return {key:k,...JSON.parse(r.value)};}catch{return null;}}));
      setSaved(items.filter(Boolean).sort((a,b)=>b.savedAt-a.savedAt));
    }catch{setSaved([]);}
  },[]);
  useEffect(()=>{refreshSaved();},[refreshSaved]);

  const saveScenario=async()=>{
    const name=(saveName.trim()||"Escenario "+(saved.length+1)).slice(0,60);
    setBusy(true);
    const payload={name,savedAt:Date.now(),cur,arr0,horizon,rate,investment,scn};
    try{await storage.set("licitia:scn:"+Date.now(),JSON.stringify(payload));setSaveName("");await refreshSaved();}
    catch{alert("No se pudo guardar el escenario.");}
    setBusy(false);
  };
  const loadScenario=(it)=>{setCur(it.cur||"USD");setArr0(it.arr0);setHorizon(it.horizon);setRate(it.rate);
    setInvestment(it.investment);setScn(it.scn.map(s=>({...s})));window.scrollTo({top:0,behavior:"smooth"});};
  const delScenario=async(key)=>{try{await storage.delete(key);await refreshSaved();}catch{}};
  const fmtDate=(t)=>new Date(t).toLocaleDateString("es-MX",{day:"2-digit",month:"short",year:"numeric"});

  /* ---------------- welcome ---------------- */
  if(!entered){
    return (
      <div className="fc-root">
        <style>{CSS}</style>
        <div className="welcome">
          <div className="wcard">
            <div className="wlogo"><img src={LOGO} alt="LicitIA"/></div>
            <p className="w-eyebrow">Método First Chicago · SaaS</p>
            <h1 className="w-h">Valora tu SaaS con el<br/>rigor de un fondo de <span className="g">Venture Capital</span></h1>
            <p className="w-sub">Proyecta tres escenarios, ponderalos por probabilidad y descuenta a hoy para llegar a una valoración pre-money <b style={{color:"#EAF7F1"}}>defendible</b> frente a inversionistas. En minutos, no en hojas de cálculo.</p>
            <div className="wchips">
              <span className="wchip">{Ico.scen}Escenarios probabilísticos</span>
              <span className="wchip">{Ico.mult}Referencias de múltiplos SaaS</span>
              <span className="wchip">{Ico.pdf}Reporte en PDF</span>
            </div>
            <div className="wctas">
              <button className="wbtn primary" onClick={()=>{applyTemplate(DEFAULTS);setEntered(true);}}>Ver ejemplo Serie A →</button>
              <button className="wbtn ghost" onClick={()=>{applyTemplate(BLANK);setEntered(true);}}>Empezar de cero</button>
            </div>
            <p className="w-foot">Herramienta educativa de modelado. No constituye asesoría financiera ni de inversión.</p>
          </div>
        </div>
      </div>
    );
  }

  /* ---------------- app ---------------- */
  return (
    <div className="fc-root">
      <style>{CSS}</style>
      <div className="screen">
      <div className="wrap">
        <header className="top">
          <div className="brand" onClick={()=>setEntered(false)} title="Volver al inicio"><img src={LOGO} alt="LicitIA"/></div>
          <div className="tools">
            <div className="seg" role="group" aria-label="Moneda">
              {Object.keys(CUR).map(k=>(<button key={k} data-on={cur===k} onClick={()=>setCur(k)}>{k}</button>))}
            </div>
            <button className="btn" onClick={reset}>Reiniciar</button>
            <button className="btn solid" onClick={()=>window.print()}>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M6 9V2h12v7M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2M6 14h12v8H6z"/></svg>
              Guardar como PDF
            </button>
          </div>
        </header>

        <section className="hero">
          <div className="hero-grid">
            <div>
              <p className="eyebrow">Valoración Pre-Money Justificada</p>
              <div className="bignum mono">{money(heroVal)}</div>
              <p className="hero-sub">Valor presente ponderado por probabilidad de los 3 escenarios de salida.</p>
              <div className="hero-mets">
                <div className="met"><p className="k">Post-Money</p><p className="v mono">{compact(calc.postMoney)}</p></div>
                <div className="met"><p className="k">Equity cedido</p><p className="v mono">{(calc.equity*100).toFixed(1)}%</p></div>
                <div className="met"><p className="k">Inversión</p><p className="v mono">{compact(investment)}</p></div>
                <div className="met"><p className="k">Horizonte</p><p className="v mono">{horizon} años</p></div>
              </div>
            </div>
            <div>
              <p className="contrib-h">De qué está hecha tu valoración</p>
              <div className="cbar">
                {calc.rows.map(rw=>{const share=Math.max(0,rw.weighted)/totalW;
                  return (<div key={rw.key} className="cseg" style={{flexGrow:Math.max(0.0001,share),background:COL[rw.key],opacity:share<0.02?0.4:1}}>
                    <span className="p">{(share*100).toFixed(0)}%</span><span className="l">{rw.name}</span></div>);})}
              </div>
              <div className="clegend">
                {calc.rows.map(rw=>(<span key={rw.key}><i className="dot" style={{background:COL[rw.key]}}/>{rw.name} · {compact(rw.weighted)}</span>))}
              </div>
            </div>
          </div>
        </section>

        <div className="body">
          <div style={{display:"flex",flexDirection:"column",gap:20}}>
            <div className="card">
              <h2>1 · Variables globales</h2>
              <p className="desc">Los supuestos base de tu startup y del trato.</p>

                <p className="hint">Ingreso recurrente anualizado de partida.</p>
                <div className="inp"><span className="pre">{C.sym}</span><input type="number" value={arr0} min={0} step={50000} onChange={e=>setArr0(+e.target.value||0)}/></div></div>
              <div className="field"><label>Tasa de descuento exigida (r)</label>
                <p className="hint">Costo de capital ajustado al riesgo. En Serie A suele ubicarse entre 30% y 50%.</p>
                <div className="inp"><input type="number" value={rate} min={0} step={1} onChange={e=>setRate(+e.target.value||0)}/><span className="suf">%</span></div></div>
              <div className="field"><label>Horizonte de salida</label>
                <p className="hint">Años estimados hasta el evento de liquidez (exit).</p>
                <div className="inp"><input type="number" value={horizon} min={1} max={12} step={1} onChange={e=>setHorizon(Math.max(1,+e.target.value||1))}/><span className="suf">años</span></div></div>
              <div className="field"><label>Monto de inversión propuesto</label>

                <div className="inp"><span className="pre">{C.sym}</span><input type="number" value={investment} min={0} step={100000} onChange={e=>setInvestment(+e.target.value||0)}/></div></div>
            </div>

            <div className="card">
              <h2>2 · Escenarios de salida</h2>
              <p className="desc">Tres futuros discretos. Las probabilidades deben sumar 100%.</p>
              {calc.rows.map((rw,i)=>(
                <div key={rw.key} className={"scn "+rw.key}>
                  <div className="scn-head">
                    <div className="scn-name">{rw.name}<span className="tag" style={{background:COL[rw.key]}}>{rw.tag}</span></div>
                    <div className="scn-out">{compact(rw.exit)}<small>Exit value</small></div>
                  </div>
                  <div className="mini-grid">
                    <div className="mini"><label>Crec. anual</label><div className="inp"><input type="number" value={rw.growth} step={1} onChange={e=>setS(i,"growth",+e.target.value||0)}/><span className="suf">%</span></div></div>
                    <div className="mini"><label>Múltiplo</label><div className="inp"><input type="number" value={rw.multiple} step={0.5} min={0} onChange={e=>setS(i,"multiple",+e.target.value||0)}/><span className="suf">x</span></div></div>
                    <div className="mini"><label>Probabilidad</label><div className="inp"><input type="number" value={rw.prob} step={5} min={0} max={100} onChange={e=>setS(i,"prob",+e.target.value||0)}/><span className="suf">%</span></div></div>
                  </div>
                  <div className="scn-calc">
                    <div><div className="k">ARR Año {horizon}</div><div className="v">{compact(rw.arrN)}</div></div>
                    <div><div className="k">Valor presente</div><div className="v">{compact(rw.pv)}</div></div>
                    <div><div className="k">Aporte ponderado</div><div className="v" style={{color:COL[rw.key]}}>{compact(rw.weighted)}</div></div>
                  </div>
                </div>
              ))}
              <div className={"probrow "+(probOk?"ok":"bad")}>
                <span>{probOk?"Probabilidades válidas":"Las probabilidades no suman 100%"}</span><b>Σ {calc.probSum.toFixed(0)}%</b>
              </div>
            </div>

            <div className="card">
              <h2>3 · Escenarios guardados</h2>
              <p className="desc">Guarda distintas configuraciones y recárgalas cuando quieras. Se conservan entre sesiones.</p>
              <div className="saverow">
                <div className="inp"><input type="text" placeholder="Nombre del escenario…" value={saveName} maxLength={60} onChange={e=>setSaveName(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")saveScenario();}}/></div>
                <button className="btn solid" onClick={saveScenario} disabled={busy}>Guardar</button>
              </div>
              {saved.length===0 ? <div className="empty">Aún no has guardado escenarios.</div> : (
                <div className="slist">
                  {saved.map(it=>(
                    <div key={it.key} className="sitem">
                      <span className="nm">{it.name}</span><span className="dt">{fmtDate(it.savedAt)}</span>
                      <button className="load" onClick={()=>loadScenario(it)}>Cargar</button>
                      <button className="del" onClick={()=>delScenario(it.key)}>Borrar</button>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>

          <div style={{display:"flex",flexDirection:"column",gap:20}}>
            <div className="card">
              <p className="chart-title">Trayectoria del ARR</p>
              <p className="chart-desc">Proyección del ingreso recurrente hasta el año de salida por escenario.</p>
              <ArrCurve rows={calc.rows} arr0={arr0} horizon={horizon} compact={compact}/>
              <div className="leg">{calc.rows.map(rw=>(<span key={rw.key}><i className="dot" style={{background:COL[rw.key]}}/>{rw.name}</span>))}</div>
            </div>
            <div className="card">
              <p className="chart-title">Puente de valoración</p>
              <p className="chart-desc">Del valor justificado (pre-money) al post-money tras la ronda.</p>
              <Bridge pre={calc.preMoney} inv={investment} post={calc.postMoney} compact={compact}/>
            </div>
            <div className="card">
              <p className="chart-title">Reparto del cap table (post-ronda)</p>
              <p className="chart-desc">Participación resultante con la valoración calculada.</p>
              <EquityRing equity={calc.equity}/>
            </div>
            <div className="read">
              <h3>Lectura del resultado</h3>
              <p>Con estos supuestos, tu valoración <b>pre-money justificada</b> es de <b>{money(calc.preMoney)}</b>. Al sumar la inversión de {compact(investment)}, el <b>post-money</b> asciende a <b>{money(calc.postMoney)}</b>, por lo que cederías <b>{(calc.equity*100).toFixed(1)}%</b> del equity en la ronda.</p>
              <p>El {((Math.max(0,calc.rows[1].weighted)/totalW)*100).toFixed(0)}% de esa valoración proviene del escenario base{calc.rows[0].weighted>calc.rows[2].weighted?", con el caso optimista aportando el segundo mayor peso.":", con el caso pesimista tirando del valor hacia abajo."} Ajusta múltiplos, crecimiento y probabilidades para negociar con números defendibles.</p>
              {!probOk && <p style={{color:"var(--down)"}}><b>Atención:</b> las probabilidades suman {calc.probSum.toFixed(0)}%. Ajústalas a 100% para una valoración metodológicamente correcta.</p>}
            </div>
          </div>
        </div>

        {/* ---------- benchmarks ---------- */}
        <section className="bench">
          <h2>Guía referencial de múltiplos SaaS</h2>
          <p className="desc">Rangos de mercado por perfil de empresa. Toca «Aplicar» para llevar el múltiplo y crecimiento al escenario correspondiente.</p>
          <div className="bgrid">
            {BENCH.map(b=>(
              <div key={b.key} className={"btile "+b.key}>
                <span className="cap">{b.label}</span>
                <div className="r" style={{color:COL[b.key]}}>{b.range}</div>
                <div className="t">{b.title}</div>
                <p className="d">{b.d}</p>
                <button className="ap" onClick={()=>applyBench(b)}>Aplicar · {b.mid}x · crec. {b.growth}%</button>
              </div>
            ))}
          </div>
          <div className="bstrip">
            <div className="bstat"><p className="k">Mediana pública</p><p className="v">6–7x ARR</p></div>
            <div className="bstat"><p className="k">Mediana privada</p><p className="v">4.8–5.3x</p></div>
            <div className="bstat"><p className="k">M&amp;A privada</p><p className="v">~3.8x</p></div>
            <div className="bstat"><p className="k">Pre-money Serie A</p><p className="v">~$49M</p></div>
            <div className="bstat"><p className="k">Premium IA</p><p className="v">+30–42%</p></div>
          </div>
          <p className="bsrc">Fuentes: SaaS Capital Index 2025 · Aventis Advisors 2025 · Bessemer / Value Add VC 2025–26 · Carta Q3 2025. Datos publicados en 2025–2026. Rangos únicamente referenciales; el múltiplo real depende de crecimiento, retención (NRR), márgenes, tamaño, riesgo y Regla del 40.</p>
        </section>

        <section className="method">
          <h2>Cómo funciona el método First Chicago</h2>
          <div className="steps">
            <div className="step"><div className="n">01</div><h4>Proyecta el ARR</h4><p>Se lleva el ARR actual hasta el año de salida en tres escenarios de crecimiento distintos.</p></div>
            <div className="step"><div className="n">02</div><h4>Aplica el múltiplo</h4><p>Cada ARR terminal se multiplica por un múltiplo sectorial para estimar el exit value.</p></div>
            <div className="step"><div className="n">03</div><h4>Descuenta a hoy</h4><p>El exit value se trae a valor presente: VP = Exit ÷ (1 + r)<sup>n</sup>.</p></div>
            <div className="step"><div className="n">04</div><h4>Pondera</h4><p>Cada valor presente se multiplica por su probabilidad; la suma debe dar 100%.</p></div>
            <div className="step"><div className="n">05</div><h4>Suma el pre-money</h4><p>La suma de los valores presentes ponderados es tu valoración pre-money justificada.</p></div>
            <div className="step"><div className="n">06</div><h4>Estructura el trato</h4><p>Pre-money + inversión = post-money, y de ahí el porcentaje de equity del fondo.</p></div>
          </div>
        </section>

        <p className="foot"><b>LicitIA · First Chicago SaaS</b> — Herramienta educativa de modelado de valoración.<br/>No constituye asesoría financiera ni de inversión. Los resultados dependen íntegramente de tus supuestos.</p>
      </div>
      </div>

      {/* ---------- print report ---------- */}
      <div className="print-report">
        <div className="pr-head">
          <img src={LOGO} alt="LicitIA"/>
          <div className="ttl">First Chicago · Reporte de valoración SaaS</div>
          <div style={{marginLeft:"auto",textAlign:"right",fontSize:11,color:"#4C5E70"}}>{new Date().toLocaleDateString("es-MX",{day:"2-digit",month:"long",year:"numeric"})}</div>
        </div>
        <div className="pr-hero">
          <div><p className="k">Valoración Pre-Money</p><p className="v">{money(calc.preMoney)}</p></div>
          <div><p className="k">Post-Money</p><p className="v">{money(calc.postMoney)}</p></div>
          <div><p className="k">Equity cedido</p><p className="v">{(calc.equity*100).toFixed(1)}%</p></div>
        </div>
        <div className="pr-sec">Variables globales</div>
        <table className="pr"><tbody>
          <tr><td>ARR actual (Año 0)</td><td className="mono">{money(arr0)}</td><td>Tasa de descuento (r)</td><td className="mono">{rate}%</td></tr>
          <tr><td>Horizonte de salida</td><td className="mono">{horizon} años</td><td>Monto de inversión</td><td className="mono">{money(investment)}</td></tr>
        </tbody></table>
        <div className="pr-sec">Escenarios</div>
        <table className="pr">
          <thead><tr><th>Escenario</th><th>Crec.</th><th>Múlt.</th><th>ARR Año {horizon}</th><th>Exit value</th><th>Valor presente</th><th>Prob.</th><th>Ponderado</th></tr></thead>
          <tbody>
            {calc.rows.map(rw=>(<tr key={rw.key}>
              <td>{rw.name}</td><td className="mono">{rw.growth}%</td><td className="mono">{rw.multiple}x</td>
              <td className="mono">{money(rw.arrN)}</td><td className="mono">{money(rw.exit)}</td>
              <td className="mono">{money(rw.pv)}</td><td className="mono">{rw.prob}%</td><td className="mono">{money(rw.weighted)}</td>
            </tr>))}
            <tr style={{fontWeight:700}}><td>Valoración Pre-Money</td><td colSpan={6}></td><td className="mono">{money(calc.preMoney)}</td></tr>
          </tbody>
        </table>
        <p className="pr-foot"><b>LicitIA · First Chicago SaaS.</b> Documento generado con fines educativos e informativos. No constituye asesoría financiera, legal ni de inversión. Todos los resultados dependen de los supuestos ingresados por el usuario. Metodología: valoración probabilística por escenarios con descuento de valor terminal (VP = Exit ÷ (1+r)^n).</p>
      </div>
    </div>
  );
}

/* ---- charts ---- */
function ArrCurve({rows,arr0,horizon,compact}){
  const W=520,H=190,pad={t:12,r:12,b:26,l:8};
  const years=Array.from({length:horizon+1},(_,i)=>i);
  const series=rows.map(rw=>({key:rw.key,pts:years.map(y=>arr0*Math.pow(1+rw.growth/100,y))}));
  const maxV=Math.max(...series.flatMap(s=>s.pts),1);
  const x=(i)=>pad.l+(i/horizon)*(W-pad.l-pad.r);
  const y=(v)=>pad.t+(1-v/maxV)*(H-pad.t-pad.b);
  const line=(pts)=>pts.map((v,i)=>(i?"L":"M")+x(i).toFixed(1)+" "+y(v).toFixed(1)).join(" ");
  return (
    <svg viewBox={`0 0 ${W} ${H}`} role="img" aria-label="Trayectoria del ARR por escenario">
      {[0,0.5,1].map((g,i)=>(<line key={i} x1={pad.l} x2={W-pad.r} y1={y(maxV*g)} y2={y(maxV*g)} stroke="var(--line)" strokeWidth="1"/>))}
      {[0,0.5,1].map((g,i)=>(<text key={i} className="axis" x={W-pad.r} y={y(maxV*g)-3} textAnchor="end">{compact(maxV*g)}</text>))}
      {years.map(yr=>(<text key={yr} className="axis" x={x(yr)} y={H-6} textAnchor="middle">A{yr}</text>))}
      {series.map(s=>(<g key={s.key}>
        <path d={line(s.pts)} fill="none" stroke={COL[s.key]} strokeWidth="2.4" strokeLinejoin="round" strokeLinecap="round"/>
        <circle cx={x(horizon)} cy={y(s.pts[horizon])} r="3.4" fill={COL[s.key]}/>
      </g>))}
    </svg>
  );
}
function Bridge({pre,inv,post,compact}){
  const max=Math.max(pre,post,1);
  const bars=[{lab:"Pre-money",val:pre,col:"var(--green)"},{lab:"+ Inversión",val:inv,col:"var(--base)"},{lab:"= Post-money",val:post,col:"var(--navy)"}];
  return (<div className="bridge">{bars.map(b=>(
    <div key={b.lab} className="brcol"><div className="brval">{compact(b.val)}</div>
      <div className="brbar" style={{height:`${Math.max(3,(b.val/max)*100)}%`,background:b.col}}/><div className="brlab">{b.lab}</div></div>
  ))}</div>);
}
function EquityRing({equity}){
  const R=54,C=2*Math.PI*R,inv=equity,fnd=1-equity;
  return (<div className="ringwrap">
    <svg width="140" height="140" viewBox="0 0 140 140">
      <circle cx="70" cy="70" r={R} fill="none" stroke="var(--field)" strokeWidth="18"/>
      <circle cx="70" cy="70" r={R} fill="none" stroke="var(--green)" strokeWidth="18" strokeDasharray={`${C*inv} ${C}`} transform="rotate(-90 70 70)"/>
      <text x="70" y="66" textAnchor="middle" fontSize="24" fontWeight="600" fill="var(--ink)" fontFamily="IBM Plex Mono">{(inv*100).toFixed(1)}%</text>
      <text x="70" y="86" textAnchor="middle" fontSize="10" fill="var(--faint)">inversor</text>
    </svg>
    <div className="ringkey">
      <div><i className="dot" style={{background:"var(--green)",width:11,height:11}}/>Inversor <span className="val">{(inv*100).toFixed(1)}%</span></div>
      <div><i className="dot" style={{background:"var(--field)",width:11,height:11,border:"1px solid var(--line)"}}/>Fundadores <span className="val">{(fnd*100).toFixed(1)}%</span></div>
    </div>
  </div>);
}

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);

    }
</script>
